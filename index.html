<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اپ آنالیز گازهای محلول در روغن ترانسفورماتور</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@iconscout/unicons@4.0.8/css/line.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page has-app-nav">
    <header class="app-header app-header-form">
      <a class="brand" href="index.html" aria-label="آسان تدبیر نیرو">
        <img src="assets/logo.png" alt="لوگوی آسان تدبیر نیرو" />
        <strong>تحلیل روغن ترانس</strong>
      </a>
    </header>

    <section class="hero">
      <div class="hero-copy">
        <span class="eyebrow">⚡ ارزیابی سریع</span>
        <h1>آنالیز گازهای محلول در روغن ترانسفورماتور</h1>
        <p class="subtitle">ورودی‌ها را ثبت کن تا نتیجه هم نمایش داده شود و هم داخل سوابق همان حساب ذخیره شود.</p>
      </div>
    </section>

    <div data-global-message hidden></div>

    <section class="layout">
      <section class="panel form-panel">
        <h2><i class="uil uil-flask"></i> ورود داده‌ها</h2>
        <div class="grid-form">
          <label class="field"><span>H2</span><span class="input-wrap"><input id="H2" type="text" inputmode="numeric" value="۳۰۷" /><small>ppm</small></span></label>
          <label class="field"><span>CH4</span><span class="input-wrap"><input id="CH4" type="text" inputmode="numeric" value="۶۵۳" /><small>ppm</small></span></label>
          <label class="field"><span>C2H2</span><span class="input-wrap"><input id="C2H2" type="text" inputmode="numeric" value="۸" /><small>ppm</small></span></label>
          <label class="field"><span>C2H4</span><span class="input-wrap"><input id="C2H4" type="text" inputmode="numeric" value="۱۰۶۵" /><small>ppm</small></span></label>
          <label class="field"><span>C2H6</span><span class="input-wrap"><input id="C2H6" type="text" inputmode="numeric" value="۱۸۰" /><small>ppm</small></span></label>
          <label class="field"><span>CO</span><span class="input-wrap"><input id="CO" type="text" inputmode="numeric" value="۱۵۵۷" /><small>ppm</small></span></label>
          <label class="field field-wide"><span>CO2</span><span class="input-wrap"><input id="CO2" type="text" inputmode="numeric" value="۱۰۷۲۳" /><small>ppm</small></span></label>
        </div>
        <button id="analyzeBtn" class="primary form-submit"><i class="uil uil-chart-pie-alt"></i> بررسی و تحلیل</button>
      </section>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="ناوبری اصلی">
    <a href="index.html" class="bottom-nav-item is-active" aria-current="page">
      <i class="uil uil-estate"></i>
      <span>خانه</span>
    </a>
    <a href="history.html" class="bottom-nav-item">
      <i class="uil uil-user"></i>
      <span>پروفایل</span>
    </a>
  </nav>

  <script src="diagnosisEngine.js"></script>
  <script src="faultDefinitions.js"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود و ثبت نام</title>
  <meta name="application-name" content="ATN | Oil Gas Analyzer" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ATN | Oil Gas Analyzer" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@iconscout/unicons@4.0.8/css/line.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page auth-page">
    <header class="app-header app-header-results">
      <h1>ورود/ثبت نام</h1>
    </header>

    <section class="hero auth-hero">
      <div class="hero-copy auth-hero-copy">
        <img class="auth-hero-logo" src="assets/logo.png" alt="لوگوی آسان تدبیر نیرو" />
        <h1>اپلیکیشن تحلیل روغن ترانسفورماتور</h1>
        <p class="auth-hero-powered">اسان‌ تدبیر نیرو</p>
      </div>
    </section>

    <div data-global-message hidden></div>

    <section class="panel auth-shell">
      <div class="auth-tab-row">
        <button class="auth-tab is-active" type="button" data-auth-tab="login">ورود</button>
        <button class="auth-tab" type="button" data-auth-tab="register">ثبت نام</button>
      </div>

      <section data-auth-panel="login" class="auth-panel">
        <form id="loginForm" class="auth-form">
          <label class="field">
            <span>شماره موبایل <span class="required-mark" aria-hidden="true">*</span></span>
            <span class="input-wrap"><input name="mobile" type="tel" inputmode="numeric" placeholder="۰۹۱۲..." required /></span>
          </label>
          <label class="field">
            <span>رمز عبور <span class="required-mark" aria-hidden="true">*</span></span>
            <span class="input-wrap input-wrap-password">
              <input name="password" type="password" placeholder="۸ تا ۳۰ کاراکتر" minlength="8" maxlength="30" pattern="[A-Za-z0-9]{8,30}" inputmode="latin" autocapitalize="off" autocomplete="current-password" data-password-input required />
              <button class="password-toggle" type="button" data-password-toggle aria-label="نمایش رمز عبور" aria-pressed="false">
                <i class="uil uil-eye"></i>
              </button>
            </span>
          </label>
          <button class="primary form-submit" type="submit"><i class="uil uil-signin"></i> ورود به حساب</button>
        </form>
        <div id="loginMessage" class="auth-message" hidden></div>
      </section>

      <section data-auth-panel="register" class="auth-panel" hidden>
        <form id="registerForm" class="auth-form">
          <div class="grid-form auth-grid">
            <label class="field">
              <span>نام <span class="required-mark" aria-hidden="true">*</span></span>
              <span class="input-wrap"><input name="firstName" type="text" placeholder="نام" required /></span>
            </label>
            <label class="field">
              <span>نام خانوادگی <span class="required-mark" aria-hidden="true">*</span></span>
              <span class="input-wrap"><input name="lastName" type="text" placeholder="نام خانوادگی" required /></span>
            </label>
            <label class="field field-wide">
              <span>نام شرکت</span>
              <span class="input-wrap"><input name="companyName" type="text" placeholder="مثلاً شرکت برق ..." required /></span>
            </label>
            <label class="field field-wide">
              <span>شماره موبایل <span class="required-mark" aria-hidden="true">*</span></span>
              <span class="input-wrap"><input name="mobile" type="tel" inputmode="numeric" placeholder="۰۹۱۲..." required /></span>
            </label>
            <label class="field field-wide">
              <span>رمز عبور <span class="required-mark" aria-hidden="true">*</span></span>
              <span class="input-wrap input-wrap-password">
                <input name="password" type="password" placeholder="فقط حروف و عدد انگلیسی" minlength="8" maxlength="30" pattern="[A-Za-z0-9]{8,30}" inputmode="latin" autocapitalize="off" autocomplete="new-password" data-password-input required />
                <button class="password-toggle" type="button" data-password-toggle aria-label="نمایش رمز عبور" aria-pressed="false">
                  <i class="uil uil-eye"></i>
                </button>
              </span>
            </label>
            <label class="field field-wide">
              <span>تکرار رمز</span>
              <span class="input-wrap input-wrap-password">
                <input name="confirmPassword" type="password" placeholder="تکرار همان رمز" minlength="8" maxlength="30" pattern="[A-Za-z0-9]{8,30}" inputmode="latin" autocapitalize="off" autocomplete="new-password" data-password-input required />
                <button class="password-toggle" type="button" data-password-toggle aria-label="نمایش رمز عبور" aria-pressed="false">
                  <i class="uil uil-eye"></i>
                </button>
              </span>
            </label>
          </div>
          <button class="primary form-submit" type="submit"><i class="uil uil-user-plus"></i> ثبت نام</button>
        </form>
        <div id="registerMessage" class="auth-message" hidden></div>
      </section>
    </section>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>

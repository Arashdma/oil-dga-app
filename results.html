<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتیجه تحلیل روغن ترانسفورماتور</title>
  <meta name="application-name" content="ATN | Oil Gas Analyzer" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ATN | Oil Gas Analyzer" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@iconscout/unicons@4.0.8/css/line.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="results-body">
  <main class="page results-page has-bottom-nav">
    <header class="app-header app-header-results">
      <div class="header-actions">
        <button id="shareAnalysisButton" class="header-share-button" type="button" aria-label="اشتراک‌گذاری نتیجه تحلیل">
          <i class="uil uil-share-alt"></i>
          <span>اشتراک گذاری</span>
        </button>
      </div>
      <h1>نتیجه تحلیل</h1>
      <button class="icon-button back-button" type="button" data-back aria-label="بازگشت به صفحه قبل">
        <span>‹</span>
      </button>
    </header>

    <section class="results-stack">
      <div id="summary" class="summary"></div>
      <section class="panel methods-panel">
        <div class="section-heading">
          <h2>خلاصه روش‌ها</h2>
        </div>
        <div id="methodResults" class="cards"></div>
      </section>
      <div id="celluloseStatus"></div>
    </section>
  </main>

  <footer class="bottom-cta">
    <a href="tel:+989126125786" class="button-link call-button"><i class="uil uil-phone"></i> مشاوره تخصصی</a>
  </footer>

  <div id="infoSheet" class="sheet-shell" aria-hidden="true" hidden>
    <button id="sheetBackdrop" class="sheet-backdrop" type="button" aria-label="بستن"></button>
    <section class="info-sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div id="sheetHandle" class="sheet-handle-wrap">
        <span class="sheet-handle"></span>
      </div>
      <div id="sheetContent" class="sheet-content"></div>
    </section>
  </div>

  <div id="upgradeModal" class="sheet-shell" aria-hidden="true" hidden>
    <button id="upgradeBackdrop" class="sheet-backdrop" type="button" aria-label="بستن"></button>
    <section class="info-sheet confirm-sheet upgrade-sheet" role="dialog" aria-modal="true" aria-labelledby="upgradeTitle">
      <div class="sheet-handle-wrap" aria-hidden="true">
        <span class="sheet-handle"></span>
      </div>
      <div class="upgrade-badge" aria-hidden="true">
        <i class="uil uil-sad-dizzy"></i>
      </div>
      <h2 id="upgradeTitle" class="confirm-modal-title">سقف نسخه رایگان شما تکمیل شده است</h2>
      <p id="upgradeMessage" class="confirm-modal-text">برای ادامه ثبت تحلیل‌های جدید، لطفاً نسخه Pro را فعال نمایید.</p>
      <div class="confirm-modal-actions">
        <a href="tel:+989126125786" class="button-link call-button confirm-modal-button">ارتقا به نسخه Pro</a>
        <button id="upgradeClose" class="compact-link confirm-modal-button" type="button">بعداً</button>
      </div>
    </section>
  </div>

  <div id="shareSheet" class="sheet-shell" aria-hidden="true" hidden>
    <button id="shareSheetBackdrop" class="sheet-backdrop" type="button" aria-label="بستن"></button>
    <section class="info-sheet confirm-sheet share-sheet" role="dialog" aria-modal="true" aria-labelledby="shareSheetTitle">
      <div class="sheet-handle-wrap" aria-hidden="true">
        <span class="sheet-handle"></span>
      </div>
      <h2 id="shareSheetTitle" class="confirm-modal-title">اشتراک گذاری نتیجه تحلیل</h2>
      <p id="shareSheetText" class="confirm-modal-text">می‌توانید تصویر این تحلیل را روی دستگاه ذخیره کنید یا با برنامه‌های دیگر به اشتراک بگذارید.</p>
      <div class="confirm-modal-actions share-sheet-actions">
        <button id="shareNativeButton" class="button-link call-button confirm-modal-button" type="button">اشتراک‌گذاری</button>
        <button id="shareDownloadButton" class="button-link secondary confirm-modal-button" type="button">دانلود تصویر</button>
      </div>
    </section>
  </div>

  <script src="diagnosisEngine.js"></script>
  <script src="faultDefinitions.js"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
